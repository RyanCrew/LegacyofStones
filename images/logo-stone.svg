<svg width="200" height="50" viewBox="0 0 200 50" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="stone-texture" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2"/>
    </filter>
    <linearGradient id="stone-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B7355;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#696969;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2F4F4F;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background stone effect -->
  <rect width="200" height="50" fill="url(#stone-gradient)" rx="5" ry="5"/>

  <!-- Stone texture overlay -->
  <rect width="200" height="50" fill="none" stroke="#654321" stroke-width="1" rx="5" ry="5" opacity="0.3"/>

  <!-- Text with stone effect -->
  <text x="100" y="35" font-family="serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#D4AF37" filter="url(#stone-texture)">
    Legacy of Stones
  </text>

  <!-- Metallic shine effect -->
  <text x="100" y="35" font-family="serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#FFD700" opacity="0.7">
    Legacy of Stones
  </text>
</svg>