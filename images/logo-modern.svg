<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" class="logo-svg">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8860b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b0000;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#dc143c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b0000;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Piedra angular (fondo) -->
  <g transform="translate(10, 15)">
    <path d="M15,25 L35,15 L55,25 L45,45 L25,45 Z"
          fill="url(#goldGradient)"
          stroke="#666"
          stroke-width="1"
          filter="url(#glow)"/>
    <path d="M20,30 L30,22 L40,30 L35,40 L25,40 Z"
          fill="#333"
          opacity="0.3"/>
    <!-- Textura de piedra -->
    <circle cx="30" cy="25" r="1" fill="#666" opacity="0.6"/>
    <circle cx="35" cy="30" r="0.8" fill="#666" opacity="0.4"/>
    <circle cx="25" cy="35" r="0.6" fill="#666" opacity="0.5"/>
  </g>

  <!-- Castillo/Estructura -->
  <g transform="translate(60, 10)">
    <!-- Torre izquierda -->
    <rect x="0" y="15" width="8" height="25" fill="url(#redGradient)" stroke="#666" stroke-width="0.5"/>
    <rect x="2" y="17" width="4" height="3" fill="#333" opacity="0.7"/>
    <rect x="2" y="22" width="4" height="3" fill="#333" opacity="0.7"/>
    <rect x="2" y="27" width="4" height="3" fill="#333" opacity="0.7"/>

    <!-- Torre central (más alta) -->
    <rect x="12" y="8" width="10" height="32" fill="url(#goldGradient)" stroke="#666" stroke-width="0.5"/>
    <rect x="14" y="10" width="6" height="4" fill="#333" opacity="0.7"/>
    <rect x="14" y="16" width="6" height="4" fill="#333" opacity="0.7"/>
    <rect x="14" y="22" width="6" height="4" fill="#333" opacity="0.7"/>
    <rect x="14" y="28" width="6" height="4" fill="#333" opacity="0.7"/>
    <!-- Puerta -->
    <rect x="15" y="32" width="4" height="8" fill="#222"/>

    <!-- Torre derecha -->
    <rect x="26" y="15" width="8" height="25" fill="url(#redGradient)" stroke="#666" stroke-width="0.5"/>
    <rect x="28" y="17" width="4" height="3" fill="#333" opacity="0.7"/>
    <rect x="28" y="22" width="4" height="3" fill="#333" opacity="0.7"/>
    <rect x="28" y="27" width="4" height="3" fill="#333" opacity="0.7"/>
  </g>

  <!-- Texto "Legacy of Stones" -->
  <text x="100" y="25" font-family="serif" font-size="16" font-weight="bold" fill="url(#goldGradient)" filter="url(#glow)">Legacy of Stones</text>
  <text x="100" y="42" font-family="sans-serif" font-size="8" fill="#cccccc" text-anchor="middle">MMORPG Server</text>

  <!-- Partículas decorativas -->
  <g opacity="0.6">
    <circle cx="180" cy="20" r="1.5" fill="url(#goldGradient)">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="185" cy="35" r="1" fill="url(#redGradient)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="175" cy="45" r="1.2" fill="url(#goldGradient)">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>